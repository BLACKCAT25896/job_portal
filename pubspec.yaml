dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/image/common/
    - assets/image/banner/
    - assets/language/
    - assets/icon/
    - assets/icon/svg/
    - assets/svg/
    - assets/map/
    - assets/payment_icon/
    - assets/font/SolaimanLipi.ttf

  fonts:
    - family: Instrument Sans
      fonts:
        - asset: assets/font/Roboto-Regular.ttf
          weight: 200
        - asset: assets/font/Roboto-Medium.ttf
          weight: 300
        - asset: assets/font/Roboto-SemiBold.ttf
          weight: 400
        - asset: assets/font/Roboto-Bold.ttf
          weight: 500
    - family: PlayfairDisplay
      fonts:
        - asset: assets/font/PlayfairDisplay-Regular.ttf
          weight: 400
        - asset: assets/font/PlayfairDisplay-Medium.ttf
          weight: 500
        - asset: assets/font/PlayfairDisplay-Bold.ttf
          weight: 700
    - family: NotoSans
      fonts:
        - asset: assets/font/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/font/NotoSans-Bold.ttf
          weight: 700
