<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <base href="/" />

  <!-- Primary SEO -->
  <title>MightyJob – Job Portal & Recruitment Management System</title>
  <meta name="description"
        content="MightyJob is a complete job portal and recruitment management system. Post jobs, manage candidates, track applications, and hire faster with a modern SaaS platform." />
  <link rel="canonical" href="https://job.mightyapp.com/" />

  <!-- Keywords (optional but useful for marketplaces like CodeCanyon) -->
  <meta name="keywords"
        content="job portal, recruitment system, hiring software, applicant tracking system, ATS, job board, HRM, MightyJob, job SaaS, BD job portal" />

  <!-- Open Graph (Facebook / LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="MightyJob – Modern Job Portal & Hiring System" />
  <meta property="og:description"
        content="Create your own job portal like Bdjobs. Manage jobs, applications, employers, and candidates in one powerful platform." />
  <meta property="og:image" content="https://job.mightyapp.com/icons/Icon-512.png" />
  <meta property="og:url" content="https://job.mightyapp.com/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MightyJob – Recruitment & Job Portal SaaS" />
  <meta name="twitter:description"
        content="Launch your own job portal with MightyJob. Fast, scalable, and easy to manage." />
  <meta name="twitter:image" content="https://job.mightyapp.com/icons/Icon-512.png" />

  <!-- PWA Essentials -->
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="icons/Icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f172a" />

  <!-- Performance -->
  <link rel="preload" href="flutter.js" as="script" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts -->
  <link rel="preload" href="assets/font/NotoSans-Regular.ttf" as="font" type="font/ttf" crossorigin="anonymous">
  <link rel="preload" href="assets/font/NotoSans-Bold.ttf" as="font" type="font/ttf" crossorigin="anonymous">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Flutter -->
  <script src="flutter.js" defer></script>

  <!-- WebView Support -->
  <script src="/assets/packages/flutter_inappwebview_web/assets/web/web_support.js" defer></script>

  <!-- Safari WebGL Fix -->
  <script>
    if (navigator.userAgent.includes("Safari") && !navigator.userAgent.includes("Chrome")) {
      const original = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function (t, ...a) {
        if (t === "webgl2") return;
        return original.call(this, t, ...a);
      };
    }
  </script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service_worker.js");
      });
    }
  </script>
</head>

<!-- Lazy Load All Scripts After Page Load -->
<script>
  window.addEventListener('load', function() {

    // --- Google Maps ---
    const mapsScript = document.createElement('script');
    mapsScript.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyBXgrRUydLwIPnE8yPNwniAP6ltpd1jzIE&loading=async&callback=Function.prototype";
    document.body.appendChild(mapsScript);

    // --- Firebase ---
    const firebaseAppScript = document.createElement('script');
    firebaseAppScript.src = "https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js";
    document.body.appendChild(firebaseAppScript);

    const firebaseMessagingScript = document.createElement('script');
    firebaseMessagingScript.src = "https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js";
    document.body.appendChild(firebaseMessagingScript);

    // --- GTM noscript (already in HTML, no changes) ---

    // --- SVG Replacement ---
    document.querySelectorAll("img.svg").forEach(function(img) {
      const xhr = new XMLHttpRequest();
      xhr.open("GET", img.src, true);
      xhr.responseType = "document";
      xhr.onload = function() {
        if (xhr.status === 200) {
          const svg = xhr.response.querySelector("svg");
          if (!svg) return;
          if (img.id) svg.id = img.id;
          if (img.className) svg.className.baseVal = img.className + " replaced-svg";
          svg.removeAttribute("xmlns:a");
          if (!svg.getAttribute("viewBox") && svg.height && svg.width) {
            svg.setAttribute("viewBox", `0 0 ${svg.height.baseVal.value} ${svg.width.baseVal.value}`);
          }
          img.parentNode.replaceChild(svg, img);
        }
      };
      xhr.send();
    });

    // --- Flutter Loader ---
    {{flutter_js}}
    {{flutter_build_config}}
    _flutter.loader.load({
      serviceWorker: { serviceWorkerVersion: {{flutter_service_worker_version}} },
      onEntrypointLoaded: function(engineInitializer) {
        engineInitializer.initializeEngine().then(function(appRunner) {
          document.querySelector(".preloader")?.remove();
          document.getElementById("splash")?.remove();
          appRunner.runApp();
        });
      }
    });

    // --- Theme Loader ---
    if (typeof Storage !== "undefined") {
      const theme = localStorage.getItem("flutter.demand_theme");
      if (theme === "true") document.body.classList.add("theme-dark");
      else document.body.classList.remove("theme-light");
    }

  });
</script>

</body>

</html>
